# Quantumult X 中国大陆单节点精简完整配置
# Based on ddgksf2013/墨鱼配置的必要模块结构 + blackmatrix7/ios_rule_script 分流规则
# Upstream rules: https://github.com/blackmatrix7/ios_rule_script
# Raw URL: https://raw.githubusercontent.com/fox37x/qx-rules/main/QuantumultX/qx-minimal.conf
#
# 使用说明：
# 1. 这是精简完整配置，补齐 [general] / [dns] / [policy] / [filter_remote] / [filter_local] 等必要模块。
# 2. 不包含重写、任务、MITM、BoxJS、图标库等乱七八糟功能。
# 3. 你只有一个节点也能用：把你的节点订阅加到 [server_remote]，或导入配置后在圈 X 里添加节点。
# 4. 代理规则统一走策略组 PROXY；国内、局域网、Apple、Microsoft 直连。

[general]
server_check_url = http://www.gstatic.com/generate_204
server_check_timeout = 3000
geo_location_checker = disabled
resource_parser_url = https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
excluded_routes = 239.255.255.250/32
# 避免部分国内 App/运营商登录异常
dns_exclusion_list = *.10099.com.cn, *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn
# 屏蔽常见 QUIC/STUN，减少部分连接绕过/异常；如游戏或视频异常可注释掉
udp_drop_list = 443, STUN, QUIC

[server_remote]
# 在这里填你的机场/节点订阅，例如：
# https://example.com/sub, tag=我的节点, update-interval=86400, opt-parser=true, enabled=true

[server_local]
# 如果你只有一个手动节点，也可以在这里添加本地节点。
# 示例格式请按 Quantumult X 节点格式填写。

[dns]
# 墨鱼配置同款精简 DNS，兼容性优先
no-ipv6
no-system
server = 223.5.5.5
server = 119.29.29.29
server = 114.114.114.114
server = /*.icloud.com/119.29.29.29
server = /*.icloud.com.cn/119.29.29.29
server = /*.tencent.com/119.29.29.29
server = /*.weixin.com/119.29.29.29

[policy]
# 单节点/单代理组版本：
# - 如果你只有一个节点，PROXY 里会包含你的节点和内置 proxy/direct。
# - 如果你不想看到 direct，可以自行删掉 direct。
static = PROXY, proxy, direct, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png

