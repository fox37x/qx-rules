# Quantumult X 中国大陆单节点分流配置
# Generated from blackmatrix7/ios_rule_script
# Upstream: https://github.com/blackmatrix7/ios_rule_script
# Raw URL: https://raw.githubusercontent.com/fox37x/qx-rules/main/QuantumultX/qx-china.conf
#
# 说明：
# - 这是“单节点/单代理组”版本，不再内置各种地区节点组。
# - 你的节点订阅/本地节点只需要存在于当前 Quantumult X 配置里，下面的 PROXY 组会匹配所有节点。
# - 国内、局域网、Apple、Microsoft 默认 direct；海外、AI、Telegram、YouTube、GitHub 等走 PROXY。

[general]
server_check_url = http://www.gstatic.com/generate_204
geo_location_checker = disabled

[policy]
static = PROXY, resource-tag-regex=.*, server-tag-regex=.*

[filter_remote]
